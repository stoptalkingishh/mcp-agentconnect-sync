[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentconnect-temporal"
version = "0.1.0"
description = "Temporal execution engine for the AgentConnect backplane — durable subtask, review, and approval workflows."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "agentconnect-core==0.2.0",
    "temporalio>=1.7",
]

[project.scripts]
agentconnect-temporal-worker = "agentconnect.temporal.worker_main:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["agentconnect.temporal*"]
namespaces = true
