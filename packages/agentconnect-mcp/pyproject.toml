[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentconnect-mcp"
version = "0.1.0"
description = "MCP adapter for the AgentConnect task backplane — the thirteen manager-facing tools."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "agentconnect-core==0.2.0",
    "mcp>=1.0",
]

[project.scripts]
agentconnect-mcp = "agentconnect.mcp.server:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["agentconnect.mcp*"]
namespaces = true
