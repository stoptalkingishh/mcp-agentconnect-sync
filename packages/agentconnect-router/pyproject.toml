[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentconnect-router"
version = "0.2.0"
description = "AgentConnect Agent Router — the MCP control plane. Classifies tasks, enforces privacy/quota policy, scores providers deterministically, and dispatches work. The primary product; runs standalone without the Model Manager."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "agentconnect-core==0.2.0",
    "mcp>=1.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
# Single-box convenience: install the Model Manager alongside the Router so the
# Router can embed an in-process manager when no MODEL_MANAGER_URL is set. The
# Router library never hard-imports it — this is a soft, optional extra.
embedded = ["agentconnect-model-manager==0.2.0"]
# Reference web approve/deny host for the spend authorizer (AGENTCONNECT_SPEND_AUTHORIZER=web).
web = ["fastapi>=0.110", "uvicorn>=0.29"]

[project.scripts]
agentconnect-router = "agentconnect.router.mcp_server:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["agentconnect.router*"]
namespaces = true
