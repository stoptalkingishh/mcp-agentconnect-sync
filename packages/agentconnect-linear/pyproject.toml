[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentconnect-linear"
version = "0.1.0"
description = "Linear adapter for the AgentConnect task backplane — push sync and webhook ingest."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = ["agentconnect-core==0.2.0"]

[project.optional-dependencies]
# Only the default (network) transport needs httpx; an injected transport does not.
http = ["httpx>=0.27"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["agentconnect.linear*"]
namespaces = true
