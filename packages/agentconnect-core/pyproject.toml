[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentconnect-core"
version = "0.2.0"
description = "Shared contracts and policy-agnostic core for the AgentConnect Router and Model Manager (schemas, config, state machine, shared memory, quota, privacy, secrets)."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.5",
    "pyyaml>=6.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["agentconnect.common*", "agentconnect.core*"]
namespaces = true
