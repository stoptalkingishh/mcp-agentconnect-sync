# Secrets template (handoff §7).
#
# COPY this file to config/secrets.yaml (gitignored) and fill in real values, OR
# leave it absent and provide secrets via environment variables. This file maps a
# provider's `secret_ref` (from providers.yaml) to how the gateway resolves it.
#
# RULES (§24):
#   - Agents never see secrets. Claude never sees secrets. MCP tools never print
#     secrets. Only the provider gateway dereferences these at call time.
#   - Provider configs contain secret *references* only, never literal secrets.
#
# Resolver kinds:
#   env:     read from an environment variable          -> { kind: env, var: NAME }
#   literal: inline value (dev/testing only, DO NOT commit real values)
#   op:      1Password CLI/Connect ref (op://vault/item/field) — resolved by
#            `op read` or the Connect API in a real deployment.
#
# In production prefer a real secrets manager (1Password, Vault, Infisical,
# Doppler, AWS/GCP Secret Manager, or SOPS+age) — the `op://` refs in
# providers.yaml are the integration point.

secret_refs:
  "op://AI/local-r9700/api-token":
    kind: env
    var: LOCAL_R9700_API_TOKEN
  "op://AI/gemini/api-key":
    kind: env
    var: GEMINI_API_KEY
  "op://AI/groq/api-key":
    kind: env
    var: GROQ_API_KEY
  "op://AI/openai/api-key":
    kind: env
    var: OPENAI_API_KEY
