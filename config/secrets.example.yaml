# Secrets template (handoff §7).
#
# COPY this file to config/secrets.yaml (gitignored) and fill in real values, OR
# leave it absent and provide secrets via environment variables. This file maps a
# provider's `secret_ref` (from providers.yaml) to how the gateway resolves it.
#
# RULES (§24):
#   - Agents never see secrets. Claude never sees secrets. MCP tools never print
#     secrets. Only the provider gateway dereferences these at call time.
#   - Provider configs contain secret *references* only, never literal secrets.
#
# Resolver kinds:
#   env:     read from an environment variable          -> { kind: env, var: NAME }
#   literal: inline value (dev/testing only, DO NOT commit real values)
#   op:      1Password CLI/Connect ref (op://vault/item/field) — resolved by
#            `op read` or the Connect API in a real deployment.
#
# In production prefer a real secrets manager (1Password, Vault, Infisical,
# Doppler, AWS/GCP Secret Manager, or SOPS+age) — the `op://` refs in
# providers.yaml are the integration point.

# NOTE: Local inference nodes (owned or rented) do NOT appear here — they
# authenticate to the Router via mutual TLS, not a shared secret. The Router's
# client cert/key/CA are provided as file PATHS via environment variables and
# referenced from providers.yaml `tls`:
#   AGENTCONNECT_LOCAL_CA / AGENTCONNECT_LOCAL_CLIENT_CERT / AGENTCONNECT_LOCAL_CLIENT_KEY
#   AGENTCONNECT_RENTED_CA / AGENTCONNECT_RENTED_CLIENT_CERT / AGENTCONNECT_RENTED_CLIENT_KEY
# The Model Manager side reads MODEL_MANAGER_TLS_CERT/KEY/CA + MODEL_MANAGER_ALLOWED_CLIENTS.
# The ONLY node-related secret is a rental VENDOR control-plane API key (below),
# used solely to rent/terminate a box — never for inference traffic.

secret_refs:
  "op://AI/gemini/api-key":
    kind: env
    var: GEMINI_API_KEY
  "op://AI/groq/api-key":
    kind: env
    var: GROQ_API_KEY
  "op://AI/openrouter/api-key":
    kind: env
    var: OPENROUTER_API_KEY
  "op://AI/xai/api-key":
    kind: env
    var: XAI_API_KEY
  "op://AI/openai/api-key":
    kind: env
    var: OPENAI_API_KEY
  # Rental vendor control-plane key (provision/terminate rented GPU nodes).
  "op://AI/runpod/api-key":
    kind: env
    var: RUNPOD_API_KEY
